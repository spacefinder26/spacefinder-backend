version: '3.9'

services:

  # ================================
  # PostgreSQL Database
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: spacefinder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spacefinder
      POSTGRES_USER: spacefinder_user
      POSTGRES_PASSWORD: spacefinder_pass
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spacefinder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacefinder_user -d spacefinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # pgAdmin (Visual DB Manager)
  # Access at http://localhost:5050
  # Email: admin@spacefinder.com
  # Password: admin123
  # ================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spacefinder-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spacefinder.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - spacefinder-network

  # ================================
  # Spring Boot Backend
  # Access at http://localhost:8080
  # Swagger at http://localhost:8080/swagger-ui/index.html
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spacefinder-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spacefinder
      SPRING_DATASOURCE_USERNAME: spacefinder_user
      SPRING_DATASOURCE_PASSWORD: spacefinder_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spacefinder-network

volumes:
  postgres_data:

networks:
  spacefinder-network:
    driver: bridge
